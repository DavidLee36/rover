; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
monitor_port = COM4

; Main motor firmware. Excludes the standalone encoder bring-up sketch so the
; two never compile together (both define setup()/loop()).
[env:teensy41]
build_src_filter = +<*> -<encoder_test.cpp>

; Encoder wiring bring-up test. Builds ONLY encoder_test.cpp.
;   pio run -e enctest -t upload
;   pio device monitor -e enctest
[env:enctest]
build_src_filter = +<encoder_test.cpp>
lib_deps = paulstoffregen/Encoder